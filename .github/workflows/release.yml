name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Strict SemVer release version, for example 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      artifact_name: ${{ steps.release.outputs.artifact_name }}
      notes: ${{ steps.release.outputs.notes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          VERSION="$(python scripts/release_utils.py resolve-version \
            --event-name "${{ github.event_name }}" \
            --ref-name "${{ github.ref_name }}" \
            --input-version "${{ inputs.version }}")"
          ARTIFACT_NAME="$(python scripts/release_utils.py artifact-name --version "$VERSION")"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          {
            echo "notes<<EOF"
            python scripts/release_utils.py notes --version "$VERSION" --changelog CHANGELOG.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  test:
    name: Release tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: pip
          cache-dependency-path: |
            requirement.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt -r requirements-dev.txt

      - name: Validate source
        run: |
          python -m compileall src
          ruff check src tests scripts
          mypy
          pytest
          pip-audit -r requirement.txt
          bandit -r src scripts -lll -c pyproject.toml

  build-windows:
    name: Build Windows artifact
    runs-on: windows-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: pip
          cache-dependency-path: |
            requirement.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt -r requirements-dev.txt

      - name: Build Windows package
        shell: pwsh
        run: ./scripts/build_windows.ps1 -Version "${{ needs.validate.outputs.version }}"

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.validate.outputs.artifact_name }}
          path: dist/release/${{ needs.validate.outputs.artifact_name }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - test
      - build-windows
    permissions:
      contents: write

    steps:
      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.validate.outputs.artifact_name }}
          path: dist/release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: HunterX v${{ needs.validate.outputs.version }}
          body: ${{ needs.validate.outputs.notes }}
          files: dist/release/${{ needs.validate.outputs.artifact_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
